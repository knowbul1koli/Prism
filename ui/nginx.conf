server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # 节点安装脚本（托管在面板，替代 GitHub 下载）
    location = /install.sh {
        add_header Content-Type text/plain;
        add_header Content-Disposition 'attachment; filename="install.sh"';
        add_header Cache-Control 'no-cache';
        try_files $uri =404;
    }

    # REST API /api/v1/
    location /api/ {
        proxy_pass http://springboot-backend:6365/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Agent
    location /agent/ {
        proxy_pass http://springboot-backend:6365/agent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # WebSocket for node system-info
    location /system-info {
        proxy_pass http://springboot-backend:6365/system-info;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
