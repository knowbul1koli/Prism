version: '3.8'

services:
  backend:
    image: eclipse-temurin:21-jre
    container_name: prism-backend
    restart: always
    network_mode: host
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/${DB_NAME}?useUnicode=true&characterEncoding=UTF-8&useSSL=false
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      LOG_DIR: /app/logs
      SERVER_PORT: ${BACKEND_PORT}
    volumes:
      - ./backend.jar:/app/backend.jar
      - ./logs:/app/logs
    working_dir: /app
    command: java -jar backend.jar

  frontend:
    image: nginx:alpine
    container_name: prism-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./ui/dist:/usr/share/nginx/html
    depends_on:
      - backend
